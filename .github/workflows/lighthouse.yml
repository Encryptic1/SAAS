name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse (standard-polls preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build standard-polls
        run: pnpm --filter standard-polls build
        env:
          NEXT_PUBLIC_LOCAL_DEV: "true"
          LOCAL_DEV: "true"
          TURBO_TELEMETRY_DISABLED: "1"
      - name: Run Lighthouse CI
        run: |
          pnpm exec @lhci/cli autorun
      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            .lighthouseci
          retention-days: 7
